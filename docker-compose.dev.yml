
services:
  jitsi-web-overlay-backend:
    build:
      context: ./jitsi-web-overlay-backend
      dockerfile: Dockerfile.dev
    ports:
      - "3030:3030"
    volumes:
      - ./jitsi-web-overlay-backend:/app
      - node_modules_backend:/app/node_modules
    env_file:
      - .env.development
    depends_on:
      - mariadb

    command: npx nodemon src/main.ts

  jitsi-web-overlay-frontend:
    build:
      context: ./jitsi-web-overlay-frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    env_file:
      - .env.development
    volumes:
      - ./jitsi-web-overlay-frontend:/app
      - node_modules_frontend:/app/node_modules
    command: npm run dev -- --host


  jitsi-web-overlay-outlook-plugin:
    build:
      context: ./jitsi-web-overlay-outlook-plugin
      dockerfile: Dockerfile
    ports:
      - "${PLUGIN_PORT}:80"
    env_file:
      - .env
    environment:
      ROOM_NAME_LENGTH: ${ROOM_NAME_LENGTH}
      ROOM_NAME_PREFIX: ${ROOM_NAME_PREFIX}
      ROOM_NAME_MODE: ${ROOM_NAME_MODE}
      DIALINNUMBER_URL: ${DIALINNUMBER_URL}
      DIALINCONFCODE_URL: ${DIALINCONFCODE_URL}
      ENABLE_PHONE_ACCESS: ${ENABLE_PHONE_ACCESS}
      JITSI_DOMAIN: ${JITSI_DOMAIN}
      PHONE_NUMBER_FORMAT: ${PHONE_NUMBER_FORMAT}
      ENABLE_MODERATOR_OPTIONS: ${ENABLE_MODERATOR_OPTIONS}
      TITLE_MEETING_DETAILS: ${TITLE_MEETING_DETAILS}
      DEBUG: ${DEBUG}
    restart: always

  mariadb:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
  mongo_data:
  node_modules_backend:
  node_modules_frontend:
