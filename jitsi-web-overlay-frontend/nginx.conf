server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Hash versioning for infos.json
    # Files infos-*.json (with hash or version) are cached for 1 year as content is immutable
    location ~* ^/infos-[a-f0-9]+\.json$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # Fallback for infos.json without versioning - always validates with server
    location = /infos.json {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header X-Content-Type-Options "nosniff";
    }
}