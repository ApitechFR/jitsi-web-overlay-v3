server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Cache versioning for infos.json
    # files infos-*.json are generated with a hash or version number to ensure cache busting when content changes
    location ~* ^/infos-[\d.]+\.json$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff";
    }

    # Fallback for infos.json without versioning, with no-cache headers to ensure clients always fetch the latest version
    location = /infos.json {
        add_header Cache-Control "no-cache, must-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header X-Content-Type-Options "nosniff";
    }
}