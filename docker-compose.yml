services:
  jitsi-web-overlay-backend:
    build:
      context: ./jitsi-web-overlay-backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - '${BACKEND_PORT}:3030'
    restart: always
    depends_on:
      - mariadb

  jitsi-web-overlay-frontend:
    build:
      context: ./jitsi-web-overlay-frontend
      dockerfile: Dockerfile
    ports:
      - '${FRONTEND_PORT}:80'
    env_file:
      - ./.env
    restart: always
    depends_on:
      - jitsi-web-overlay-backend

  mariadb:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_ROOT_USER: ${DB_USERNAME}
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
    ports:
      - '3306:3306'
    volumes:
      - mariadb_data:/var/lib/mysql

  visioreplay-ssh:
    image: alpine:latest
    env_file: ./.env
    restart: always
    ports:
      - ${HOST_DATA_SSH_PORT}:22
    command:
      - /bin/sh
      - -c
      - addgroup --gid 101 -S jibri-k8s-record;
        adduser --uid 1000 jibri-k8s-record -G jibri-k8s-record;
        echo 'jibri-k8s-record:SuperlonguCledeplusde50charDeLutilisateurquinutiliserajamaissonmotdepasse' | chpasswd;
        apk add rsync;
        apk add --no-cache openssh;
        echo 'PasswordAuthentication no' >> /etc/ssh/sshd_config;
        echo 'PermitRootLogin no' >> /etc/ssh/sshd_config;
        ssh-keygen -A;
        /usr/sbin/sshd -D -d -p 22;
    volumes:
      - ./jibri-k8s-record_home:/home/jibri-k8s-record
      - visioreplay_data:/data

volumes:
  visioreplay_data:
  mariadb_data:
  mongo_data:
