services:
  jitsi-web-overlay-backend:
    build:
      context: ./jitsi-web-overlay-backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - '${BACKEND_PORT}:3030'
    restart: always
    depends_on:
      - mariadb
    volumes:
      - visioreplay_data:/data/visioreplay

  jitsi-web-overlay-frontend:
    build:
      context: ./jitsi-web-overlay-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${API_URL}
        VITE_APP_TEMPLATE: ${APP_TEMPLATE}
    ports:
      - '${FRONTEND_PORT}:80'
    restart: always
    depends_on:
      - jitsi-web-overlay-backend
    volumes:
      - ./client-resources:/usr/share/nginx/html/assets/client-resources:ro

  jitsi-web-overlay-outlook-plugin:
    build:
      context: ./jitsi-web-overlay-outlook-plugin
      dockerfile: Dockerfile
      args:
        ADDIN_BASE_URL: ${ADDIN_BASE_URL}
        DIALINNUMBER_URL: ${DIALINNUMBER_URL}
        DIALINCONFCODE_URL: ${DIALINCONFCODE_URL}
        ENABLE_PHONE_ACCESS: ${ENABLE_PHONE_ACCESS}
        PHONE_NUMBER_FORMAT: ${PHONE_NUMBER_FORMAT}
        ENABLE_MODERATOR_OPTIONS: ${ENABLE_MODERATOR_OPTIONS}
        TITLE_MEETING_DETAILS: ${TITLE_MEETING_DETAILS}
        DEBUG: ${DEBUG}
        ROOM_NAME_LENGTH: ${ROOM_NAME_LENGTH}
        ROOM_NAME_PREFIX: ${ROOM_NAME_PREFIX}
        ROOM_NAME_MODE: ${ROOM_NAME_MODE}
        PLUGIN_PORT: ${PLUGIN_PORT}
    ports:
      - "${PLUGIN_PORT}:80"
    env_file:
      - ./.env
    environment:
      ADDIN_BASE_URL: ${ADDIN_BASE_URL}
      DIALINNUMBER_URL: ${DIALINNUMBER_URL}
      DIALINCONFCODE_URL: ${DIALINCONFCODE_URL}
      ENABLE_PHONE_ACCESS: ${ENABLE_PHONE_ACCESS}
      PHONE_NUMBER_FORMAT: ${PHONE_NUMBER_FORMAT}
      ENABLE_MODERATOR_OPTIONS: ${ENABLE_MODERATOR_OPTIONS}
      TITLE_MEETING_DETAILS: ${TITLE_MEETING_DETAILS}
      DEBUG: ${DEBUG}
      ROOM_NAME_LENGTH: ${ROOM_NAME_LENGTH}
      ROOM_NAME_PREFIX: ${ROOM_NAME_PREFIX}
      ROOM_NAME_MODE: ${ROOM_NAME_MODE}
      PLUGIN_PORT: ${PLUGIN_PORT}
    restart: always


  mariadb:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql

  visioreplay-ssh-v3:
    image: alpine:latest
    env_file: ./.env
    restart: always
    ports:
      - ${HOST_DATA_SSH_PORT}:22
    command:
      - /bin/sh
      - -c
      - addgroup --gid 101 -S jibri-k8s-record;
        adduser --uid 1000 jibri-k8s-record -G jibri-k8s-record;
        chown -R jibri-k8s-record:jibri-k8s-record /data/visioreplay;
        echo 'jibri-k8s-record:SuperlonguCledeplusde50charDeLutilisateurquinutiliserajamaissonmotdepasse' | chpasswd;
        apk add rsync;
        apk add --no-cache openssh;
        echo 'PasswordAuthentication no' >> /etc/ssh/sshd_config;
        echo 'PermitRootLogin no' >> /etc/ssh/sshd_config;
        ssh-keygen -A;

volumes:
  visioreplay_data:
  mariadb_data:
