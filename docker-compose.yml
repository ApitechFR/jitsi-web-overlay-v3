services:
  jitsi-web-overlay-backend:
    build:
      context: .
      dockerfile: ./jitsi-web-overlay-backend/Dockerfile.prod
    env_file:
      - .env
    ports:
      - '${PORT}:${PORT}'
    restart: always
    depends_on:
      - mariadb

  jitsi-web-overlay-frontend:
    build:
      context: .
      dockerfile: ./jitsi-web-overlay-frontend/Dockerfile.prod
    ports:
      - '${FRONTEND_PORT}:80'
    environment:
      - NODE_ENV=production
    restart: always
    depends_on:
      - jitsi-web-overlay-backend

  visioreplay-ssh:
    image: alpine:latest
    env_file: ./.env
    restart: always
    ports:
      - $HOST_DATA_SSH_PORT:22
    command:
      - /bin/sh
      - -c
      - addgroup --gid 101 -S jibri-k8s-record;
        adduser --uid 1000 jibri-k8s-record -G jibri-k8s-record;
        echo 'jibri-k8s-record:SuperlonguCledeplusde50charDeLutilisateurquinutiliserajamaissonmotdepasse' | chpasswd;
        apk add rsync;
        apk add --no-cache openssh;
        echo 'PasswordAuthentication no' >> /etc/ssh/sshd_config;
        echo 'PermitRootLogin no' >> /etc/ssh/sshd_config;
        ssh-keygen -A;
        /usr/sbin/sshd -D -d -p 22;
    volumes:
      - ./jibri-k8s-record_home:/home/jibri-k8s-record
      - visioreplay_data:/data

volumes:
  visioreplay_data:
  mariadb_data:
  mongo_data:
